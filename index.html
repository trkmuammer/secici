<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastgele İsim Seçici</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        h2 { color: #333; }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            resize: none;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover { background-color: #0056b3; }
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #28a745;
            min-height: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>İsim Seçici</h2>
    <p>Her satıra bir isim yazın:</p>
    <textarea id="nameList" placeholder="Ahmet&#10;Mehmet&#10;Ayşe..."></textarea>
    <button onclick="pickRandomName()">Şanslı Kişiyi Seç!</button>
    <div id="result"></div>
</div>

<script>
    function pickRandomName() {
        const textArea = document.getElementById('nameList');
        const resultDiv = document.getElementById('result');
        
        // Satırları ayır ve boşlukları temizle
        const names = textArea.value.split('\n').filter(name => name.trim() !== "");

        if (names.length === 0) {
            resultDiv.innerText = "Lütfen önce isim yazın!";
            resultDiv.style.color = "#dc3545";
            return;
        }

        // Rastgele seçim işlemi
        const randomIndex = Math.floor(Math.random() * names.length);
        const selectedName = names[randomIndex];

        // Sonucu ekrana yazdır
        resultDiv.style.color = "#28a745";
        resultDiv.innerText = "🎉 Seçilen: " + selectedName;
    }
</script>

</body>
</html>
